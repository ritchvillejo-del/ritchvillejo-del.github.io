<script>
const textArray = [
    "Connect.",
    "Interact.",
	"Share.",
    "Feedback.",
    "Contact Us!"
];

let index = 0;
let charIndex = 0;
let currentText = '';
let isDeleting = false;

function typeEffect() {
    const display = document.getElementById("typing");
    currentText = textArray[index];

    if (!isDeleting) {
        display.textContent = currentText.substring(0, charIndex++);
    } else {
        display.textContent = currentText.substring(0, charIndex--);
    }

    let speed = isDeleting ? 50 : 100;

    if (!isDeleting && charIndex === currentText.length + 1) {
        speed = 1500;
        isDeleting = true;
    } else if (isDeleting && charIndex === 0) {
        isDeleting = false;
        index = (index + 1) % textArray.length;
        speed = 500;
    }

    setTimeout(typeEffect, speed);
}

typeEffect();
</script>
<script>
const transition = document.getElementById("page-transition");

// intercept all links
document.querySelectorAll("a[href]").forEach(link => {
    const url = link.getAttribute("href");

    // skip external / anchors
    if (url.startsWith("#") || url.startsWith("http")) return;

    link.addEventListener("click", function(e) {
        e.preventDefault();

        transition.classList.add("active");
        document.body.classList.add("fade-out");

        setTimeout(() => {
            window.location.href = url;
        }, 500);
    });
});

// remove transition on load
window.addEventListener("load", () => {
    transition.classList.remove("active");
});
</script>
<script>
// intersection observer (like Framer Motion viewport)
const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            entry.target.classList.add("show");
        }
    });
}, {
    threshold: 0.15
});

// apply to all motion elements
document.querySelectorAll(".motion").forEach(el => {
    observer.observe(el);
});
</script>
<script>
const nav = document.querySelector("nav");

window.addEventListener("scroll", () => {
    if (window.scrollY > 10) {
        nav.classList.add("scrolled");
    } else {
        nav.classList.remove("scrolled");
    }
});
</script>
