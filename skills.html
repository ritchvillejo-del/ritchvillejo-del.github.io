<script>
const textArray = [
    "Developing Systems.",
    "Design and Animations.",
	"Webpage.",
    "Coding.",
    "Tools."
];

let index = 0;
let charIndex = 0;
let currentText = '';
let isDeleting = false;

function typeEffect() {
    const display = document.getElementById("typing");
    currentText = textArray[index];

    if (!isDeleting) {
        display.textContent = currentText.substring(0, charIndex++);
    } else {
        display.textContent = currentText.substring(0, charIndex--);
    }

    let speed = isDeleting ? 50 : 100;

    if (!isDeleting && charIndex === currentText.length + 1) {
        speed = 1500;
        isDeleting = true;
    } else if (isDeleting && charIndex === 0) {
        isDeleting = false;
        index = (index + 1) % textArray.length;
        speed = 500;
    }

    setTimeout(typeEffect, speed);
}

typeEffect();
</script>
<script>
// smooth page enter
document.addEventListener("DOMContentLoaded", () => {
    document.body.classList.add("page-enter");

    requestAnimationFrame(() => {
        document.body.style.opacity = "1";
        document.body.style.transform = "translateY(0)";
    });
});

// smooth page exit
document.querySelectorAll("a[href]").forEach(link => {
    const url = link.getAttribute("href");

    if (url.startsWith("#") || url.startsWith("http")) return;

    link.addEventListener("click", function(e) {
        e.preventDefault();

        document.body.classList.add("page-exit");

        setTimeout(() => {
            window.location.href = url;
        }, 300);
    });
});
</script>
<script>
// intersection observer (like Framer Motion viewport)
const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            entry.target.classList.add("show");
        }
    });
}, {
    threshold: 0.15
});

// apply to all motion elements
document.querySelectorAll(".motion").forEach(el => {
    observer.observe(el);
});
</script>
<script>
const nav = document.querySelector("nav");

window.addEventListener("scroll", () => {
    if (window.scrollY > 10) {
        nav.classList.add("scrolled");
    } else {
        nav.classList.remove("scrolled");
    }
});
</script>
